# ─────────────────────────────────────────────────────────────────────────────
# NEXUS Platform — Docker Compose para servidor Proxmox
#
# Servicios:
#   - postgres        → base de datos
#   - nexus-backend   → NestJS API (puerto interno 3000)
#   - nexus-frontend  → Angular SPA servida por nginx (puerto 8080)
#
# Uso:
#   docker compose -f docker-compose.server.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  nexus-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-server-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development   # permite TypeORM synchronize (crea tablas automáticamente)
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: nexus_db
      JWT_SECRET: nexus-server-jwt-secret-change-me
      CORS_ORIGIN: "*"
      # Okta OIDC — callback apunta al nginx del servidor Proxmox
      OKTA_ISSUER: https://integrator-8219939.okta.com/oauth2/default
      OKTA_CLIENT_ID: 0oa10uytq2nG1fNRZ698
      OKTA_CLIENT_SECRET: G6GYyaqw8sBiRrMCyM3wQTY-J9VZbiXXPQlah_z9O5upOx5J6mEXofRV4-VIIPDb
      # nginx proxea /api/v1 → backend:3000, así el callback es accesible vía el mismo puerto del frontend
      OKTA_REDIRECT_URI: http://65.21.132.180:8209/api/v1/auth/okta/callback
      OKTA_POST_LOGIN_REDIRECT: http://65.21.132.180:8209/auth/callback
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/system-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Angular Frontend (Nginx) ───────────────────────────────────────────────
  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      nexus-backend:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.standalone.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

networks:
  default:
    name: nexus-server-net
