# ─────────────────────────────────────────────────────────────────────────────
# NEXUS Platform Dashboard — Docker Compose para servidor Proxmox
# Uso:
#   docker compose -f docker-compose.server.yml up -d --build
#
# El frontend se sirve en el puerto 80 (o 8080 si no hay acceso a root)
# Kong gestiona el OIDC con Okta — el frontend solo redirige a Kong
# ─────────────────────────────────────────────────────────────────────────────

services:
  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"     # Puerto 8080 del servidor → 8080 del contenedor Nginx (no requiere root)
    volumes:
      # Config simplificada: sin proxies a nexus-backend ni airflow (no existen en este servidor)
      # El frontend llama directamente a Kong en 65.21.132.180:30800
      - ./nginx.standalone.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: nexus-frontend-net
