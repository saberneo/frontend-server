# ─────────────────────────────────────────────────────────────────────────────
# NEXUS Platform Dashboard — Nginx configuration
# Serves the Angular SPA on port 8080 (non-root user compatible)
# Proxies:
#   /api/v1/   → nexus-backend:3000  (NestJS REST API)
#   /airflow/  → nexus-airflow-webserver:8080  (Airflow REST API)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name _;

    # Log errors to container logs for debugging
    error_log /dev/stderr info;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Docker health check endpoint ─────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy: NestJS REST API ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://nexus-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Ensure session cookies are forwarded to the backend
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    # ── Proxy: WebSocket (Socket.io) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://nexus-backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Proxy: Airflow REST API ──────────────────────────────────────────
    location /airflow/ {
        proxy_pass         http://nexus-airflow-webserver:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: Kong M1 API (avoids browser CORS / OIDC preflight) ───────
    # Frontend → nginx (same-origin) → Kong → M1 API upstream
    # nginx passes through Authorization: Bearer <okta_token> to Kong
    location /kong-m1/ {
        proxy_pass         http://65.21.132.180:30800/api/v1/m1/;
        proxy_http_version 1.1;
        # Kong is sensitive to Host formatting; do NOT include port in Host.
        proxy_set_header   Host              65.21.132.180;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Explicitly forward Authorization and tenant headers to Kong
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   X-Tenant-ID       $http_x_tenant_id;
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    # ── Static assets with cache ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Angular SPA — all routes → index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
