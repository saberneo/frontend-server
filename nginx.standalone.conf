# ─────────────────────────────────────────────────────────────────────────────
# nginx.standalone.conf — Para deploy standalone en servidor Proxmox
#
# Sin proxies a nexus-backend ni airflow (no existen en el servidor).
# El frontend Angular llama directamente a Kong (65.21.132.180:30800).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Health check ─────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy: NestJS Backend (Okta auth + todas las APIs) ───────────────────
    # El backend corre en el mismo stack Docker como nexus-backend:3000
    location /api/ {
        proxy_pass         http://nexus-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    # ── Static assets con cache ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Angular SPA — todas las rutas → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
