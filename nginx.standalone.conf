# ─────────────────────────────────────────────────────────────────────────────
# nginx.standalone.conf — Para deploy standalone en servidor Proxmox
#
# Sin proxies a nexus-backend ni airflow (no existen en el servidor).
# El frontend Angular llama directamente a Kong (65.21.132.180:30800).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Health check ─────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Static assets con cache ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Angular SPA — todas las rutas → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
